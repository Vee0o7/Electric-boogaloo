################
### MONITORS ###
################
monitor = eDP-1, 1920x1200@60, 0x0, 1

workspace = 1,monitor:eDP-1
workspace = 2,monitor:eDP-1
workspace = 3,monitor:eDP-1
workspace = 4,monitor:eDP-1
workspace = 5,monitor:eDP-1
workspace = 6,monitor:eDP-1
workspace = 7,monitor:eDP-1
workspace = 8,monitor:eDP-1
workspace = 9,monitor:eDP-1
workspace = 10,monitor:eDP-1




###################
### MY PROGRAMS ###
###################
$terminal = ghostty
$web = librewolf
$fileManager = yazi
$menu = rofi -show drun
$powermenu = zsh ~/.config/rofi/powermenu.sh
$screenshot = hyprshot -m region -m active --clipboard-only
$hyprlock = hyprlock
$killpanel = killall waybar
$startpanel = waybar


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER 

bind = $mainMod shift, S, exec, $screenshot
bind = $mainMod, C, exec, $themes
bind = $mainMod, return, exec, $terminal
bind = $mainMod, W, exec, $web
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit
bind = $mainMod, F, fullscreen
bind = $mainMod, E, exec, $fileManager
bind = alt, F, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, escape, exec, $powermenu
bind = alt, S, togglesplit, 
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod shift, 1, movetoworkspace, 1
bind = $mainMod shift, 2, movetoworkspace, 2
bind = $mainMod shift, 3, movetoworkspace, 3
bind = $mainMod shift, 4, movetoworkspace, 4
bind = $mainMod shift, 5, movetoworkspace, 5
bindm = alt, mouse:272, movewindow
bindm = alt shift, mouse:272, resizewindow
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
# bindr = $mainMod, $mainMod_L, overview:toggle


#################
### AUTOSTART ###
#################



exec-once=waybar
